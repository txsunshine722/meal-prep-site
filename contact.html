    <header> 
        <nav>

                <li><a href="index.html">Home</a></li>

            </ul>

    <section class="contact">
        <h2>Contact Us</h2>
        <p class="contact-intro">We'd love to hear from you. Send us your question and we will get back to you soon.</p>
        
        <div class="contact-details">
            <p><strong>Phone: </strong> <a href="tel:18066868103">(806) 686-4567</a></p>

            <p><strong>Email: </strong><a href="mailto:hello@hubcitymealpreps.com">hello@hubcitymealpreps.com</a></p>
            <p><strong>Pickup Location: </strong>Downtown Hub City</p>

            <p><strong>Pickup Hours: </strong>Sunday 3:00pm - 6:00pm</p>
        </div>

        <form id="contact-form" class="contact-form" action="#" method="post" novalidate>
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" autocomplete="name" required>

            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" autocomplete="email" required>

            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" required>

            <label for="message">Message</label>
            <textarea id="message" name="message" rows="6" required></textarea>

            <button type="submit">Send Message</button>
            <p id="form-status" class="form-status" aria-live="polite"></p>
        </form>
    </section>

    <script src="js/script.js"></script>
    </body>
</html>
